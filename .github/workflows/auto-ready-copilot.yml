name: Auto-ready Copilot Draft PRs

on:
  pull_request:
    types: [opened, converted_to_draft]

jobs:
  auto-ready:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'copilot-swe-agent[bot]'
    permissions:
      pull-requests: write
    steps:
      - name: Mark PR as ready for review
        run: |
          gh pr ready "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
